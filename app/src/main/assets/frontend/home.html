
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPals - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div id="subject-selection" class="text-center">
        <h1>Let's Learn Together!</h1>
        <p>Choose your learning adventure! 🚀</p>

        <div class="subject-grid">
            <div class="subject-card" onclick="startQuiz('Math')">
                <i class="fas fa-plus subject-icon"></i>
                <h3>Addition</h3>
            </div>
            <div class="subject-card" onclick="startQuiz('Reading')">
                <i class="fas fa-book-open subject-icon"></i>
                <h3>Reading</h3>
            </div>
            <div class="subject-card" onclick="startQuiz('Science')">
                <i class="fas fa-flask subject-icon"></i>
                <h3>Science</h3>
            </div>
            <div class="subject-card" onclick="startQuiz('Government')">
                <i class="fas fa-gavel subject-icon"></i>
                <h3>Government</h3>
            </div>
        </div>
    </div>

    <div id="quiz-container" style="display:none;">
        <div id="question-container" class="text-center">
            <h3 id="question-title"></h3>
            <div id="options-container"></div>
            <p id="score-display"></p>
            <button class="btn btn-secondary" onclick="goBackToSubjects()">Back to Subjects</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
